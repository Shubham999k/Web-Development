<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <table border="1" cellspacing="2">
        <tr>
          <th colspan="4">Registration Form</th>
        </tr>
        <tr>
          <td><b>Student Name</b></td>
          <td><input type="text" id="first" placeholder="First Name" /></td>
          <td><input type="text" id="middle" placeholder="Middle Name" /></td>
          <td><input type="text" id="last" placeholder="Last Name" /></td>
        </tr>
        <tr>
          <td><b>Father's Name</b></td>
          <td>
            <input
              type="text"
              id="father's name"
              placeholder="Enter your father's Name"
            />
          </td>
          <td><b>Mother's Name</b></td>
          <td>
            <input
              type="text"
              id="mother's name"
              placeholder="Enter your Mother's Name"
            />
          </td>
        </tr>
        <tr>
          <td><b>Date of Birth</b></td>
          <td><input type="date" id="dob" /></td>
          <td><b>Gender</b></td>
          <td>
            <b>Male</b><input type="radio" name="gender" /><b>Female</b
            ><input type="radio" name="gender" />
          </td>
        </tr>
        <tr>
          <td><b>Category</b></td>
          <td>
            <b>Gen</b><input type="radio" name="Category" /><b>OBC</b
            ><input type="radio" name="Category" /><b>SC/ST</b
            ><input type="radio" name="Category" />
          </td>
          <td><b>Handicapped</b></td>
          <td>
            <b>Yes</b><input type="radio" name="handicapped" /><b>No</b
            ><input type="radio" name="handicapped" />
          </td>
        </tr>
        <tr>
          <td><b>Ex-Serviceman</b></td>
          <td>
            <b>Yes</b><input type="radio" name="Ex-Serviceman" /><b>No</b
            ><input type="radio" name="Ex-Serviceman" />
          </td>
          <td><b>EWS</b></td>
          <td>
            <b>Yes</b><input type="radio" name="EWS" /><b>No</b
            ><input type="radio" name="EWS" />
          </td>
        </tr>
        <tr>
          <td><b>Email ID</b></td>
          <td><input type="email" id="email" /></td>
          <td><b>Mobile No.</b></td>
          <td><input type="number" id="number" /></td>
        </tr>
        <tr>
          <td><b>State</b></td>
          <td>
            <select>
              <option>Select any One</option>
            </select>
          </td>
          <td><b>City</b></td>
          <td>
            <select>
              <option>Select any One</option>
            </select>
          </td>
        </tr>
        <tr>
          <td><b>Upload Photo</b></td>
          <td><input type="file" accept=".img*" /></td>
          <td><b>Upload Signature</b></td>
          <td><input type="file" accept=".img*" /></td>
        </tr>
        <tr>
          <td></td>
          <th colspan="3"><button>Submit</button></th>
        </tr>
      </table>
    </form>
  </body>
</html>
