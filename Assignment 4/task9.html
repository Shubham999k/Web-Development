<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <h2>Pizza Order Form</h2>
        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" /> <br />
        <br />

        <label for="lastname">Last Name:</label>
        <input type="text" id="lastname" /> <br />
        <br />

        <label for="email">Email Address:</label>
        <input type="email" id="email" /> <br />
        <br />

        <label for="contact">Contact Number:</label>
        <input type="number" id="contact" /> <br />
        <br />

        <label for="date">Prefered Delivery Date:</label>
        <input type="date" id="date" /> <br />
        <br />

        <span>Size:</span> <br />
        <input type="radio" name="size" />
        <span>Small</span>
        <input type="radio" name="size" />
        <span>Medium</span>
        <input type="radio" name="size" />
        <span>Large</span> <br />
        <br />

        <span>Flavor:</span> <br />
        <input type="checkbox" />
        <span>Hawaiion (Php 150.00)</span>
        <select>
          <option>1</option>
        </select>
        <br />

        <input type="checkbox" />
        <span>Pepperoni (Php 140.00)</span>
        <select>
          <option>1</option>
        </select>
        <br />

        <input type="checkbox" />
        <span>Vegetable (Php 130.00)</span>
        <select>
          <option>1</option>
        </select>
        <br />
        <br />

        <label for="creditcard">Credit Card Number:</label>
        <input type="number" name="creditcard" /> <br /> <br>

        <label for="pin">PIN</label>
        <input type="number" name="pin" /> <br /> <br>

        <label for="note">Additional Note:</label> <br />
        <textarea name="" id=""></textarea>
        <br />

        <button>Submit Order</button>
      </fieldset>
    </form>
  </body>
</html>
