<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <h1>Doctor Appointment Form</h1>
      <hr />
      <table>
        <tr>
          <td><b>Appointment Date</b></td>
          <td><input type="date" /></td>
        </tr>
        <tr>
          <td><b>Appointment Time</b></td>
          <td><input type="time" /></td>
        </tr>
        <tr>
          <td><b>Name</b></td>
          <td><input type="text" placeholder="First" /></td>
          <td><input type="text" placeholder="Last" /></td>
        </tr>
        <tr>
          <td><b>Gender</b></td>
          <td>
            <b>Male</b><input type="radio" name="Gender" /><b>Female</b
            ><input type="radio" name="Gender" />
          </td>
        </tr>
        <tr>
          <td><b>Address</b></td>
          <td><input type="text" placeholder="city" /></td>
          <td><input type="text" placeholder="state" /></td>
        </tr>
        <tr>
          <td><b>Your Query</b></td>
          <td><textarea></textarea></td>
        </tr>
        <tr>
          <td><b>Appointment Type</b></td>
          <td>
            Select which appointment type(s) you require <br /><input
              type="checkbox"
            /><b>Cervix checkup</b> <br /><input type="checkbox" /><b
              >Heart checkup</b
            ><br /><input type="checkbox" /><b>Eye check-up</b><br /><input
              type="checkbox"
            /><b>Hearing Test</b> <br /><br />
            <button>Send</button>
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
