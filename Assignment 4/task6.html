<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h3>Registration Form : Dance Club</h3>
    <hr />
    <table>
      <tr>
        <td rowspan="12"><img src="./Dr..webp" alt="Dr." /></td>
        <td>
          <tr>
            <td>Name:</td>
            <td><input type="text" /></td>
          </tr>
          <tr>
            <td>IC No:</td>
            <td>
              <input type="text" />- <input type="text" />-
              <input type="text" />
            </td>
          </tr>
          <tr>
            <td>Address:</td>
            <td><textarea></textarea></td>
          </tr>
          <tr>
            <td>Gender:</td>
            <td>
              <input type="radio" name="gender" /> <span>Male</span>
              <input type="radio" name="gender" />Female
            </td>
          </tr>
          <tr>
            <td>Dance Type:</td>
            <td>
              <input type="checkbox" /> <span>Zapin</span
              ><input type="checkbox" /> <span>joget</span
              ><input type="checkbox" /> <span>Lion Dance</span>
            </td>
          </tr>
          <tr>
            <td>Competition:</td>
            <td>
              <select size="3">
                <option>State Level</option>
                <option>National Level</option>
                <option>Internationa Level</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>Nationality:</td>
            <td>
              <select>
                <option>-please select</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>Password:</td>
            <td><input type="text" /></td>
          </tr>
        </td>
      </tr>
      <tr>
        <td><button>Register Me</button> <button>Cancel</button></td>
      </tr>
    </table>
  </body>
</html>
