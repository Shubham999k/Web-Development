<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>Registration Form</h2>
    <form>
      <label for="firstname">First Name :</label>
      <input type="text" id="firstname" placeholder="Enter First Name" /><br />

      <label for="lastname">Last Name :</label>
      <input type="text" id="lastname" placeholder="Enter Last Name" /><br />

      <label for="email">Email :</label>
      <input type="email" id="email" placeholder="Enter Email Address" /><br />

      <label for="password">Password :</label>
      <input type="password" name="" id="password" /> <br />

      <span>Gender :</span> <br />
      <span>Male</span>
      <input type="radio" name="gender" /><br />
      <span>Female</span>
      <input type="radio" name="gender" /><br />
      <span>Other</span>
      <input type="radio" name="gender" /><br />

      <label for="age">Age :</label>
      <input type="number" id="age" /><br />

      <span>Prefrences :</span> <br />
      <span>Acrylic painting</span>
      <input type="checkbox" /> <br />
      <span>Oil Painting</span>
      <input type="checkbox" /> <br />
      <span>Water Color Painting</span>
      <input type="checkbox" /> <br>

      <span>Select Option</span>
      <select>
        <option>Student</option>
      </select> <br>

      <span>Bio</span>
      <textarea placeholder="Share few lines about yourself..."></textarea><br>

      <button>RESET</button>
      <button>SUBMIt</button>
    </form>
  </body>
</html>
