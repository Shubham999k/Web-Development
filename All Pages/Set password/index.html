<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <a href="../../My Profile/index.html"
        ><img src="My name Logo.png" alt="" height="100px" width="100px"
      /></a>
    </nav>
    <div class="outerdiv">
      <div id="loginSection">
        <h2>Set a password</h2>
        <p>
          Your previous password will reset, please set a new password for your
          account.
        </p>

        <div class="email">
          <label for="email">Create Password</label>
          <input type="password" placeholder="XXXX" />
        </div>
        <div class="email">
          <label for="password">Re-enter-Password</label>
          <input type="password" placeholder="XXXX" />
        </div>
        <div><button class="button">Set Password</button></div>
      </div>
      <div id="imageSection">
        <img src="Rectangle 20.png" alt="" />
      </div>
    </div>
  </body>
</html>
